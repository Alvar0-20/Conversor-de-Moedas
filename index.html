<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <title>Conversor de Moedas</title>
</head>
<body>
    <img class="logo" src="./assets/logo-convert.png" alt="logo-conversor-moedas">
<main>
    <label>
        Converter <b>de:</b>
        <select class="currency-select-to-convert">
            <option value="real">R$ real </option>
            <option value="dolar">US$ dólar </option>
            <option value="euro">€ euro </option>
            <option value="bitcoin">₿ bitcoin </option>
        </select>
    </label>

    <label>
        Converter <b>para:</b>
        <select class="currency-select-to-converted">
            <option value="real">R$ real </option>
            <option value="dolar">US$ dólar </option>
            <option value="euro">€ euro </option>
            <option value="bitcoin">₿ bitcoin </option>
        </select>

    </label>
    <label>
        <b>Valor</b>
        <input class="input-currency" placeholder="R$10.000,00">
    </label>

    <button class="convert-button">Converter</button>

    <section>
        <div class="currency-box">
            <img class="currency-img-to-convert" src="./assets/real.png" alt="logo-moeda-a-converter">
            <p class="currency" id="currency-to-convert-name">Real</p>
            <p class="currency-value-to-convert">R$ 0,00</p>
        </div>

        <img class="arrow-img" src="./assets/arrow.png" alt="seta-do-conversor">

        <div class="currency-box">
            <img class="currency-img" src="./assets/dolar.png" alt="logo-moeda-convertida">
            <p class="currency" id="currency-name">Dolar</p>
            <p class="currency-value-to-converted">US$ 0,00</p>
        </div>
    </section>


</main>

    <script src="scripts.js"></script>
</body>

</html>
